<!doctype html>
<html lang="en" data-bs-theme="light">

<head>

    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS v5.3.8 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
</head>

<body>
    <input type="text" name="" id="search-box" placeholder="search product">
    <div id="results"></div>

    <div class="container mt-5">
        <div class="row ">
            {% for i in ingredients %}
            <div class="col-12 col-sm-6 col-md-4 col-lg-2">
                <button class="ingredient-button btn btn-info w-100 mb-2" data-id="{{i.id}}"
                    data-name="{{i.ingredient_name}}" style="color:black;">
                    {{ i.ingredient_name }}
                </button>
            </div>
            {% endfor %}
        </div>
    </div>

    <div id="selected"></div>

    <form method="post" action="{% url 'ilist' %}" id="recipie-form">
        {% csrf_token %}
        <input type="hidden" id="selected-ingredients" name="selected-ingredients">
        <button type="submit">Find Recipies</button>
    </form>

    <script>

        const searchBox = document.getElementById("search-box")
        const results = document.getElementById("results")



        searchBox.addEventListener("keyup", function () {
            let query = this.value;
            fetch(`/search/?q=${query}`)
                .then(res => res.json())
                .then(data => {
                    results.innerHTML = "";
                    data.forEach(item => {
                        results.innerHTML += `
                        <button onclick="selectedIngredient(${item.id},'${item.ingredient_name}')">
                            ${item.ingredient_name}</button>
                        `;
                    })
                })
        })

    </script>

    <script>

        let selectedIngredients = [];
        function selectedIngredient(id, name) {
            console.log(selectedIngredients)
            if (!selectedIngredients.includes(id)) {
                selectedIngredients.push(id);
                document.getElementById("selected").innerHTML += `
                <span id="ingredient-${id}" class="badge bg-success p-3 fs-3">
                    ${name}
                    <button onclick="removeIngredient(${id})">❌</button>
                    </span>
                `
            }
        }

        function removeIngredient(id) {
            selectedIngredients = selectedIngredients.filter(item => item !== id);
            document.getElementById(`ingredient-${id}`).remove()
        }


        const ingredientButtons = document.querySelectorAll(".ingredient-button");

        ingredientButtons.forEach(button => {
            button.addEventListener("click", function () {
                console.log(this.dataset.name)
                const id = Number(this.dataset.id);
                const name = this.dataset.name;
                selectedIngredient(id, name);

            });
        });

        const form = document.getElementById("recipie-form")
        form.addEventListener("submit", function () {
            document.getElementById('selected-ingredients').value = selectedIngredients;
        })

    </script>


</body>

</html
