<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>COOKSY</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            background: #f3f4f6;
            font-family: 'Segoe UI', sans-serif;
        }

        /* NAVBAR */

        .navbar {
            background: white;
            padding: 20px 0;
        }

        .logo {
            font-size: 42px;
            font-weight: 800;
            color: #15803d;
        }

        .nav-link {
            font-weight: 600;
            color: black;
            margin: 0 15px;
        }

        .login-btn {
            background: #15803d;
            color: white;
            padding: 12px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
        }

        /* HERO */

        .hero {
            min-height: 90vh;
            display: flex;
            align-items: center;
        }

        .hero-title {
            font-size: 88px;
            font-weight: 800;
            line-height: 1.05;
        }

        .green {
            color: #15803d;
        }

        .orange {
            color: #f97316;
        }

        .hero-text {
            margin-top: 25px;
            font-size: 24px;
            color: #555;
            max-width: 600px;
        }

        .hero-buttons {
            margin-top: 40px;
        }

        .find-btn {
            background: #15803d;
            color: white;
            border: none;
            padding: 18px 35px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
        }

        .work-btn {
            background: white;
            border: none;
            padding: 18px 35px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            margin-left: 15px;
        }

        .hero-image {
            width: 100%;
            height: 650px;
            object-fit: cover;
            border-radius: 35px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, .15);
        }

        /* HOW IT WORKS */

        .section-title {
            text-align: center;
            font-size: 50px;
            font-weight: 800;
        }

        .feature-card {
            background: white;
            padding: 35px;
            border-radius: 20px;
            text-align: center;
            height: 100%;
            transition: .3s;
        }

        .feature-card:hover {
            transform: translateY(-5px);
        }

        .feature-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #dcfce7;
            color: #15803d;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
            font-size: 30px;
        }

        /* RECIPES */

        .recipe-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, .08);
        }

        .recipe-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .recipe-body {
            padding: 20px;
        }

        /* CTA */

        .cta {
            background: #15803d;
            color: white;
            border-radius: 30px;
            padding: 70px;
        }

        /* FOOTER */

        footer {
            background: #111827;
            color: white;
            padding: 70px 0;
        }

        footer a {
            color: #d1d5db;
            text-decoration: none;
        }

        @media(max-width:991px) {

            .hero-title {
                font-size: 55px;
            }

            .hero-image {
                height: 400px;
                margin-top: 40px;
            }

            .hero {
                padding: 60px 0;
            }

        }

        .recipe-gridd {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .recipe-cardd {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 10px;
        }

        .recipe-ing-card {
    width: 100%;
    min-height: 85px;

    display: flex;
    align-items: center;
    gap: 12px;

    padding: 12px;

    background: #ffffff;
    border: 2px solid #e5e7eb;   /* subtle gray border */
    border-radius: 18px;

    cursor: pointer;
    transition: all 0.25s ease;
}

.recipe-ing-card:hover {
    border-color: #16a34a;       /* theme green */
    box-shadow: 0 4px 12px rgba(22, 163, 74, 0.15);
    transform: translateY(-2px);
}

.recipe-ing-card__image {
    width: 55px;
    height: 55px;

    object-fit: contain;
    background: #f9fafb;

    border-radius: 50%;
    border: 2px solid #d1d5db;   /* soft gray */

    padding: 4px;
    flex-shrink: 0;
}

.recipe-ing-card__title {
    color: #1f2937;
    font-size: 14px;
    font-weight: 600;
}
/* Search Wrapper */
.cooksy-search-wrapper {
    position: relative;
}

/* Search Input */
.cooksy-search-input {
    width: 100%;
    height: 58px;

    padding-left: 50px;
    padding-right: 20px;

    border: 2px solid #d1d5db;
    border-radius: 18px;

    background: #fff;

    font-size: 15px;

    transition: all 0.25s ease;
}

.cooksy-search-input:focus {
    outline: none;
    border-color: #16a34a;

    box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.15);
}

/* Search Icon */
.cooksy-search-icon {
    position: absolute;
    left: 18px;
    top: 29px;

    transform: translateY(-50%);

    color: #16a34a;
    font-size: 16px;
}

/* Results Dropdown */
#results {
    display: none;

    position: absolute;
    top: 70px;
    left: 0;

    width: 100%;

    background: white;

    border-radius: 16px;

    padding: 12px;

    box-shadow: 0 10px 30px rgba(0,0,0,0.08);

    z-index: 999;

    flex-wrap: wrap;
    gap: 8px;
}

/* Result Pills */
.cooksy-search-result-item {
    border: 1px solid #d1d5db;

    background: #fff;

    color: #374151;

    padding: 8px 14px;

    border-radius: 999px;

    font-size: 14px;
    font-weight: 500;

    cursor: pointer;

    transition: all 0.2s ease;
}

.cooksy-search-result-item:hover {
    background: #16a34a;
    color: white;
    border-color: #16a34a;
}
    </style>

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg">

        <div class="container">

            <a class="navbar-brand logo" href="#">
                <i class="fa-solid fa-utensils"></i>
                COOKSY
            </a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav mx-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'home' %}">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#how-it-works">How It Works</a>
                    </li>

                    <!-- <li class="nav-item">
                        <a class="nav-link" href="#">Recipes</a>
                    </li> -->

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'ilist' %}">Ingredients</a>
                    </li>

                </ul>



            </div>

        </div>

    </nav>
    {% block base %}

    {% endblock base %}
    <!-- FOOTER -->

    <footer>

        <div class="container">

            <div class="row">

                <div class="col-md-4">

                    <h2>COOKSY</h2>

                    <p>
                        Smart recipe discovery platform.
                    </p>

                </div>

                <div class="col-md-4">

                    <h5>Links</h5>

                    <p><a href="#">Home</a></p>
                    <p><a href="#">Recipes</a></p>
                    <p><a href="#">Ingredients</a></p>

                </div>

                <div class="col-md-4">

                    <h5>Contact</h5>

                    <p>support@cooksy.com</p>

                </div>

            </div>

        </div>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
