

<!doctype html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Checkout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f8f9fa;
        }

        .checkout-card {
            max-width: 500px;
            margin: 80px auto;
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .08);
        }

        .amount {
            font-size: 3rem;
            font-weight: 700;
            color: #0d6efd;
        }

        .secure-badge {
            color: #6c757d;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card checkout-card">
            <div class="card-body p-5 text-center">

                <h2 class="mb-3">Complete Your Payment</h2>

                <p class="text-muted mb-4">
                    Review your order and proceed securely.
                </p>

                <div class="amount mb-2">
                    ₹{{total_price}}
                </div>

                <p class="secure-badge mb-4">
                    🔒 Secure payment powered by Razorpay
                </p>

                <button id="rzp-button1" class="btn btn-primary btn-lg w-100">
                    Pay ₹{{total_price}}
                </button>

            </div>
        </div>
    </div>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        var options = {
            "key": "{{razorpay_key}}", // Enter the Key ID generated from the Dashboard
            "amount": "{{total_price}}", // Amount is in currency subunits. 
            "currency": "INR",
            "name": "Acme Corp",
            "description": "Test Transaction",
            "image": "https://example.com/your_logo",
            "order_id": "{{payment.id}}", //This is a sample Order ID. Pass the `id` obtained in the response of Step 1
            "callback_url": "http://localhost:8000/user/paymentverify",
            "prefill": {
                "name": "<name>",
                "email": "<email>",
                "contact": "<phone>"
            },
            "notes": {
                "address": "Razorpay Corporate Office"
            },
            "theme": {
                "color": "#3399cc"
            }
        };
        var rzp1 = new Razorpay(options);
        document.getElementById('rzp-button1').onclick = function (e) {
            rzp1.open();
            e.preventDefault();
        }
    </script>
</body>

</html>
