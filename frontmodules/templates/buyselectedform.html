<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>

    <title>Checkout</title>
</head>

<body class="bg-dark-150 text-slate-900    min-h-screen">

    <div class="max-w-6xl mx-auto py-10 px-5">

        <!-- Heading -->
        <div class="text-center mb-10">

            <h1 class="text-5xl font-bold text-orange-600">
                🛒 Checkout
            </h1>

            <p class="text-gray-500 mt-2">
                Complete your ingredient purchase
            </p>

        </div>


        <div class="grid lg:grid-cols-2 gap-10">

            <!-- Order Summary -->
            <div class="bg-white rounded-3xl shadow-lg p-8">

                <h2 class="text-2xl font-bold mb-6">
                    Order Summary
                </h2>

                {% for i in selected_ingredients %}

                <div class="flex justify-between items-center border-b py-4">

                    <div>

                        <h3 class="font-semibold text-lg">
                            {{i}}
                        </h3>

                    </div>

                    <span class="font-bold text-orange-600">
                        ₹{{i.price}}
                    </span>

                </div>

                {% endfor %}

                <div class="mt-6 flex justify-between text-xl font-bold">

                    <span>Total</span>

                    <span class="text-orange-600">
                        ₹{{total_price}}
                    </span>

                </div>

            </div>



            <!-- Customer Details -->
            <div class="bg-white rounded-3xl shadow-lg p-8">

                <h2 class="text-2xl font-bold mb-6">
                    Customer Information
                </h2>

                <form method="POST" action="{% url 'buy-selected' %}" class="space-y-5">

                    {% csrf_token %}

                    <input type="text" name="name" placeholder="Full Name" required
                        class="w-full border rounded-xl px-4 py-3 focus:ring-2 focus:ring-orange-400 outline-none">

                    <input type="email" name="email" placeholder="Email Address" required
                        class="w-full border rounded-xl px-4 py-3 focus:ring-2 focus:ring-orange-400 outline-none">

                    <input type="tel" name="phone" placeholder="Phone Number" required
                        class="w-full border rounded-xl px-4 py-3 focus:ring-2 focus:ring-orange-400 outline-none">

                    <textarea name="address" rows="4" placeholder="Delivery Address" required
                        class="w-full border rounded-xl px-4 py-3 focus:ring-2 focus:ring-orange-400 outline-none resize-none"></textarea>

                    <button
                        class="w-full bg-orange-500 hover:bg-orange-600 text-white py-4 rounded-xl font-semibold text-lg transition duration-300">

                        Complete Order

                    </button>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
